  services:
    metabase:
      image: metabase/metabase:latest
      container_name: metabase
      ports:
        - "3000:3000"
      environment:
        MB_DB_TYPE: h2
        MB_DB_FILE: /metabase-data/metabase.db
        MB_SITE_URL: https://sketchable-unepithelial-sanjuanita.ngrok-free.dev
      volumes:
        - ~/dpt-challenges/movies-dashboard/metabase_backup.db:/metabase-data
      restart: unless-stopped